version: "3.9"

services:
  qr-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qr-telegram-bot
    restart: unless-stopped

    # ── CHOOSE ONE MODE ──────────────────────────────────────
    # Webhook mode (needs WEBHOOK_DOMAIN):
    command: node server.js
    # Polling mode (no domain needed):
    # command: node polling.js

    ports:
      - "3000:3000" # Only needed for webhook mode

    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - CHANNEL_ID=${CHANNEL_ID}
      - CHANNEL_LINK=${CHANNEL_LINK}
      - BOT_USERNAME=${BOT_USERNAME}
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}   # e.g. https://yourdomain.com (webhook mode only)
      - PORT=3000

    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
