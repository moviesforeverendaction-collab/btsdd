services:
  - type: web
    name: qr-telegram-bot
    env: node
    region: oregon          # Change: oregon | frankfurt | singapore | ohio
    plan: free              # Change to: starter | standard | pro

    buildCommand: npm install
    startCommand: node server.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false          # Set manually in Render dashboard
      - key: CHANNEL_ID
        sync: false
      - key: CHANNEL_LINK
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: WEBHOOK_DOMAIN
        fromService:
          type: web
          name: qr-telegram-bot
          property: host
      - key: PORT
        value: 10000         # Render uses port 10000

    autoDeploy: true
